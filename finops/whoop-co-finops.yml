costAllocation:
  - dimension: member
    description: Cost is attributed to the WHOOP user/member; no per-team or per-tenant allocation surface is offered.
  - dimension: integration
    description: For organizations using WHOOP Unite (team plan), integration partner is typically responsible for
      per-member subscription cost.
notes:
  - API usage is included in the membership at no incremental charge. There is no token/call/byte metering.
  - The Trusted Partner program uses a private commercial agreement and is not exposed in self-serve FinOps surfaces.
  - Hardware replacement and upgrade cycles are handled through the WHOOP Join program; treat as Purchase.
